name: "security-radar"
description: "Scan for vulnerabilities (Semgrep + OWASP rules), trace blast radius, upload SARIF and comment on PRs."
author: "CosmicAlpaca"
branding:
  icon: "shield"
  color: "blue"

inputs:
  path:
    description: "Directory to scan"
    required: false
    default: "."
  github-token:
    description: "Token for the PR comment (pass secrets.GITHUB_TOKEN). Required when comment is enabled."
    required: false
    default: ""
  fail-on:
    description: "Fail the job when findings reach this severity: error | warning | info. Empty = never fail (informational)."
    required: false
    default: ""
  rules-only:
    description: "Only the bundled custom rules (offline; skip registry presets)."
    required: false
    default: "false"
  comment:
    description: "Post/update a PR comment on pull_request events."
    required: false
    default: "true"
  sarif:
    description: "Upload SARIF to the repository Security tab."
    required: false
    default: "true"

runs:
  using: "composite"
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"

    # Install radar from the action's own checkout (github.action_path holds this
    # repo at the pinned ref), so the version always matches the action ref and it
    # works the same when dogfooded locally (uses: ./). Rules ship inside the
    # package — no rules dir needed in the target repo. Semgrep is not a radar
    # dependency, so install it too for a native `radar scan` runtime.
    - name: Install security-radar
      shell: bash
      run: |
        pip install semgrep
        pip install "${{ github.action_path }}"

    # JSON drives the PR comment + the gate; always produced, never gated here.
    - name: Scan (findings JSON)
      shell: bash
      run: |
        EXTRA=""
        if [ "${{ inputs.rules-only }}" = "true" ]; then EXTRA="--rules-only"; fi
        radar scan "${{ inputs.path }}" --format json $EXTRA > radar.json

    - name: Scan (SARIF)
      if: ${{ inputs.sarif == 'true' }}
      shell: bash
      run: |
        EXTRA=""
        if [ "${{ inputs.rules-only }}" = "true" ]; then EXTRA="--rules-only"; fi
        radar scan "${{ inputs.path }}" --format sarif $EXTRA > radar.sarif

    - name: Upload SARIF to Security tab
      if: ${{ inputs.sarif == 'true' }}
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: radar.sarif

    # Blast radius for the PR diff (needs the caller's checkout to use fetch-depth: 0).
    - name: Trace impact (PR only)
      if: ${{ github.event_name == 'pull_request' }}
      shell: bash
      env:
        BASE_REF: ${{ github.event.pull_request.base.ref }}
      run: |
        radar impact --path "${{ inputs.path }}" --diff "origin/${BASE_REF}...HEAD" --format json > impact.json || echo '{}' > impact.json

    - name: Render PR comment
      if: ${{ github.event_name == 'pull_request' && inputs.comment == 'true' }}
      shell: bash
      run: |
        IMPACT=""
        if [ -f impact.json ]; then IMPACT="impact.json"; fi
        python3 "${{ github.action_path }}/scripts/render-pr-comment.py" radar.json $IMPACT > comment.md

    - name: Upsert PR comment
      if: ${{ github.event_name == 'pull_request' && inputs.comment == 'true' }}
      uses: actions/github-script@v7
      with:
        github-token: ${{ inputs.github-token }}
        script: |
          const fs = require('fs');
          const body = fs.readFileSync('comment.md', 'utf8');
          const {data: comments} = await github.rest.issues.listComments({
            ...context.repo, issue_number: context.issue.number,
          });
          const prev = comments.find(c => c.body.includes('<!-- security-radar -->'));
          if (prev) {
            await github.rest.issues.updateComment({...context.repo, comment_id: prev.id, body});
          } else {
            await github.rest.issues.createComment({...context.repo, issue_number: context.issue.number, body});
          }

    - name: Upload report artifact
      if: ${{ always() }}
      uses: actions/upload-artifact@v4
      with:
        name: radar-report
        path: |
          radar.json
          radar.sarif
          impact.json
        if-no-files-found: ignore

    # Gate last so the comment + SARIF always post first. Reads the summary from
    # radar.json — no extra scan.
    - name: Gate
      if: ${{ inputs.fail-on != '' }}
      shell: bash
      env:
        FAIL_ON: ${{ inputs.fail-on }}
      run: |
        python3 - "$FAIL_ON" <<'PY'
        import json, sys
        levels = {"error": ["error"], "warning": ["error", "warning"], "info": ["error", "warning", "info"]}
        threshold = sys.argv[1].lower()
        summary = json.load(open("radar.json")).get("summary", {})
        n = sum(summary.get(k, 0) for k in levels.get(threshold, ["error"]))
        print(f"gate: {n} finding(s) at/above {threshold}")
        sys.exit(1 if n > 0 else 0)
        PY
