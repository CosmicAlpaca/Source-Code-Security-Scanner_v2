name: Security Scan

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "20 17 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Dogfood: radar scans itself through its own composite action (uses: ./).
  radar:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # SARIF -> Security tab
      pull-requests: write     # PR comment
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0        # needed for impact diff on PRs
      - uses: ./
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}

  # Radar-specific: verify the bundled custom rules against their fixtures.
  rule-tests:
    runs-on: ubuntu-latest
    container:
      image: semgrep/semgrep:latest
    steps:
      - uses: actions/checkout@v4
      - name: Test custom rules against fixtures
        run: semgrep --test --metrics off src/radar/rules/
