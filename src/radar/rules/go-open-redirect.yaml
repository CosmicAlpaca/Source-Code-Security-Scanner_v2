rules:
  - id: go-open-redirect
    languages: [go]
    severity: WARNING
    message: >-
      User-controlled URL used in HTTP redirect — allows open redirect attacks.
      Validate the redirect target against an allowlist of trusted paths/domains.
    metadata:
      category: security
      cwe: "CWE-601: Open Redirect"
      owasp: "A01:2021 - Broken Access Control"
      confidence: MEDIUM
    mode: taint
    pattern-sources:
      - pattern: $R.URL.Query().Get(...)
      - pattern: $R.FormValue(...)
    pattern-sinks:
      - pattern: http.Redirect($W, $R, $URL, ...)
