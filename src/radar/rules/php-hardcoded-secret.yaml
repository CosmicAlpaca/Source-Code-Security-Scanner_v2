rules:
  - id: php-hardcoded-secret
    languages: [php]
    severity: WARNING
    message: >-
      Hardcoded credential/secret in source. Load secrets from environment variables
      (getenv) or a secrets manager — never commit them.
    metadata:
      category: security
      cwe: "CWE-798: Use of Hard-coded Credentials"
      owasp: "A07:2021 - Identification and Authentication Failures"
      confidence: MEDIUM
    patterns:
      - pattern: $VAR = "...";
      - metavariable-regex:
          metavariable: $VAR
          regex: '^\$(?i)(password|passwd|secret|api_?key|token|auth_?token|access_?token|private_?key)$'
      - pattern-not: $VAR = "";
