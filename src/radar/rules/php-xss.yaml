rules:
  - id: php-xss
    languages: [php]
    severity: ERROR
    message: >-
      User-controlled value echoed without escaping — Cross-Site Scripting (XSS).
      Use htmlspecialchars() or htmlentities() before outputting user input.
    metadata:
      category: security
      cwe: "CWE-79: Cross-site Scripting"
      owasp: "A03:2021 - Injection"
      confidence: HIGH
    pattern-either:
      - pattern: echo $_GET[$KEY]
      - pattern: echo $_POST[$KEY]
      - pattern: echo $_REQUEST[$KEY]
      - pattern: echo $_COOKIE[$KEY]
      - pattern: print($_GET[$KEY])
      - pattern: print($_POST[$KEY])
