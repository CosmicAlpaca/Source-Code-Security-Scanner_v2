rules:
  - id: java-hardcoded-crypto-key
    severity: ERROR
    languages: [java]
    message: >
      Hardcoded cryptographic key detected. Embedding keys in source code
      exposes them in version control. Use a key management service instead.
    metadata:
      category: security
      cwe: "CWE-321: Use of Hard-coded Cryptographic Key"
      owasp: "A02:2021 - Cryptographic Failures"
      confidence: HIGH
    pattern-either:
      - pattern: new SecretKeySpec("...".getBytes(), ...)
      - pattern: new SecretKeySpec("...".getBytes($ENC), ...)
      - pattern: new PBEKeySpec("...".toCharArray(), ...)
