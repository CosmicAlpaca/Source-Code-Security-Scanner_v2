rules:
  - id: py-subprocess-shell-true
    languages: [python]
    severity: ERROR
    message: >-
      subprocess called with shell=True and a dynamically-built command string
      — command injection risk. Pass an argument list without shell=True, or
      use shlex.quote on every interpolated value.
    metadata:
      category: security
      cwe: "CWE-78: Improper Neutralization of Special Elements used in an OS Command"
      owasp: "A03:2021 - Injection"
      confidence: MEDIUM
    patterns:
      - pattern: subprocess.$FUNC($CMD, ..., shell=True, ...)
      - metavariable-pattern:
          metavariable: $CMD
          patterns:
            - pattern-either:
                - pattern: $A + $B
                - pattern: f"..."
