rules:
  - id: js-hardcoded-jwt-secret
    languages: [javascript, typescript]
    severity: ERROR
    message: >-
      Hardcoded JWT secret in source code. Anyone with repo access can forge
      tokens. Load the secret from an environment variable or secret manager.
    metadata:
      category: security
      cwe: "CWE-798: Use of Hard-coded Credentials"
      owasp: "A07:2021 - Identification and Authentication Failures"
      confidence: HIGH
    pattern-either:
      - pattern: $JWT.sign($PAYLOAD, "...", ...)
      - pattern: $JWT.verify($TOKEN, "...", ...)
