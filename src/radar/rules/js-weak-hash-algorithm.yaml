rules:
  - id: js-weak-hash-algorithm
    patterns:
      - pattern: crypto.createHash("$ALG")
      - metavariable-regex:
          metavariable: $ALG
          regex: ^(md5|sha1|MD5|SHA1|sha-1|md4|MD4)$
    message: >
      Weak hash algorithm '$ALG' detected. MD5 and SHA1 are cryptographically
      broken and should not be used for security purposes (passwords, integrity
      checks, signatures). Use SHA-256 or stronger.
    languages: [javascript, typescript]
    severity: WARNING
    metadata:
      category: security
      cwe: "CWE-327: Use of a Broken or Risky Cryptographic Algorithm"
      owasp: "A02:2021 - Cryptographic Failures"
