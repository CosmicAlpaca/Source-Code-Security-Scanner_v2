rules:
  - id: java-xxe
    severity: ERROR
    languages: [java]
    message: >
      XML External Entity (XXE) vulnerability: DocumentBuilderFactory is not
      configured to disable external entity processing. Set
      XMLConstants.FEATURE_SECURE_PROCESSING and disable DOCTYPE declarations.
    metadata:
      category: security
      cwe: "CWE-611: Improper Restriction of XML External Entity Reference"
      owasp: "A05:2021 - Security Misconfiguration"
      confidence: MEDIUM
    pattern: $FACTORY.newDocumentBuilder()
