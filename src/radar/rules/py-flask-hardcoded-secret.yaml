rules:
  - id: py-flask-hardcoded-secret
    languages:
      - python
    message: >-
      Hardcoded Flask secret key in source code. Anyone with access to the source
      can forge session cookies or CSRF tokens.
      Load the secret from an environment variable: app.secret_key = os.environ.get('SECRET_KEY').
    severity: ERROR
    patterns:
      - pattern: $APP.secret_key = "$SECRET"
      - pattern-not: $APP.secret_key = os.environ.get(...)
      - pattern-not: $APP.secret_key = os.getenv(...)
    metadata:
      category: security
      cwe: "CWE-798: Use of Hard-coded Credentials"
      owasp: "A07:2021 - Identification and Authentication Failures"
