rules:
  - id: java-command-injection
    languages: [java]
    severity: ERROR
    message: >-
      User-controlled data passed to Runtime.exec() or ProcessBuilder — OS command injection.
      Avoid executing shell commands with user input; use whitelisted arguments only.
    metadata:
      category: security
      cwe: "CWE-78: OS Command Injection"
      owasp: "A03:2021 - Injection"
      confidence: MEDIUM
    mode: taint
    pattern-sources:
      - pattern: $REQ.getParameter(...)
      - pattern: $REQ.getHeader(...)
      - pattern: $REQ.getPathInfo()
    pattern-sinks:
      - pattern: Runtime.getRuntime().exec($CMD)
      - pattern: new ProcessBuilder($CMD, ...)
      - pattern: $PB.command($CMD, ...)
