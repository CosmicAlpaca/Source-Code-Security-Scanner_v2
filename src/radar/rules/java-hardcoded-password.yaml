rules:
  - id: java-hardcoded-password
    severity: ERROR
    languages: [java]
    message: >
      Hardcoded credential detected in Java source. Credentials must not be
      embedded in code; use environment variables or a secrets manager instead.
    metadata:
      category: security
      cwe: "CWE-798: Use of Hard-coded Credentials"
      owasp: "A07:2021 - Identification and Authentication Failures"
      confidence: HIGH
    pattern-either:
      - patterns:
          - pattern: String $VAR = "..."
          - metavariable-regex:
              metavariable: $VAR
              regex: "(?i)(password|passwd|secret|credential|apikey|api_key|token|auth)"
      - pattern: DriverManager.getConnection($URL, $USER, "...")
      - pattern: new PasswordAuthentication($USER, "...".toCharArray())
