rules:
  - id: java-hardcoded-password
    languages: [java]
    severity: ERROR
    message: >-
      Password or credential is hardcoded as a string literal.
      Store credentials in environment variables or a secrets manager.
    metadata:
      category: security
      cwe: "CWE-259: Hardcoded Password"
      owasp: "A07:2021 - Identification and Authentication Failures"
      confidence: MEDIUM
    pattern-either:
      - pattern: String $VAR = "..."; where $VAR =~ "(password|passwd|secret|credential|apikey|api_key|token)"
      - patterns:
          - pattern: String $VAR = "..."
          - metavariable-regex:
              metavariable: $VAR
              regex: "(?i)(password|passwd|secret|credential|apiKey|api_key|token|auth)"
      - pattern: DriverManager.getConnection($URL, $USER, "...")
