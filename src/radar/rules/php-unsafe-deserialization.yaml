rules:
  - id: php-unsafe-deserialization
    languages: [php]
    severity: ERROR
    message: >-
      unserialize() called with user-controlled data — Remote Code Execution risk.
      Use JSON (json_decode) instead, or implement __wakeup / Serializable safeguards.
    metadata:
      category: security
      cwe: "CWE-502: Deserialization of Untrusted Data"
      owasp: "A08:2021 - Software and Data Integrity Failures"
      confidence: HIGH
    pattern-either:
      - pattern: unserialize($_GET[...])
      - pattern: unserialize($_POST[...])
      - pattern: unserialize($_COOKIE[...])
      - pattern: unserialize($_REQUEST[...])
