rules:
  - id: go-ssrf-user-input
    languages: [go]
    severity: ERROR
    message: >-
      User-controlled URL flows into HTTP client — allows Server-Side Request Forgery (SSRF).
      Validate the URL against an allowlist of trusted domains before making requests.
    metadata:
      category: security
      cwe: "CWE-918: SSRF"
      owasp: "A10:2021 - Server-Side Request Forgery"
      confidence: MEDIUM
    mode: taint
    pattern-sources:
      - pattern: $R.URL.Query().Get(...)
      - pattern: $R.FormValue(...)
      - pattern: $R.PostFormValue(...)
    pattern-sinks:
      - pattern: http.Get($URL)
      - pattern: http.Post($URL, ...)
      - pattern: http.NewRequest($METHOD, $URL, ...)
      - pattern: $CLIENT.Get($URL)
      - pattern: $CLIENT.Post($URL, ...)
