rules:
  - id: go-hardcoded-crypto-key
    languages: [go]
    severity: ERROR
    message: >-
      Cryptographic key is hardcoded as a string literal.
      Load keys from environment variables or a secrets manager.
    metadata:
      category: security
      cwe: "CWE-321: Hardcoded Cryptographic Key"
      owasp: "A02:2021 - Cryptographic Failures"
      confidence: HIGH
    pattern-either:
      - pattern: hmac.New($HASH, []byte("..."))
      - pattern: aes.NewCipher([]byte("..."))
      - pattern: des.NewCipher([]byte("..."))
      - pattern: $KEY := []byte("...")
