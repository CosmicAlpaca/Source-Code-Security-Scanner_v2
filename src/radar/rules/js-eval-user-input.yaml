rules:
  - id: js-eval-user-input
    languages:
      - javascript
      - typescript
    message: >-
      Code Injection: user-controlled input flows into eval() or Function().
      An attacker can execute arbitrary JavaScript on the server.
      Never pass untrusted data to eval — use JSON.parse for data or a safe expression parser.
    severity: ERROR
    mode: taint
    pattern-sources:
      - pattern: $REQ.query
      - pattern: $REQ.body
      - pattern: $REQ.params
    pattern-sinks:
      - pattern: eval(...)
      - pattern: new Function(...)
      - pattern: Function(...)
    metadata:
      category: security
      cwe: "CWE-94: Improper Control of Generation of Code ('Code Injection')"
      owasp: "A08:2021 - Software and Data Integrity Failures"
