rules:
  - id: go-hardcoded-jwt-secret
    languages: [go]
    severity: ERROR
    message: >-
      JWT signing secret is hardcoded. Anyone with access to the source code
      can forge tokens. Load the secret from an environment variable or secrets manager.
    metadata:
      category: security
      cwe: "CWE-321: Hardcoded Cryptographic Key"
      owasp: "A07:2021 - Identification and Authentication Failures"
      confidence: HIGH
    pattern-either:
      - pattern: jwt.Parse($TOKEN, func($T *jwt.Token) (interface{}, error) { return []byte("..."), nil })
      - pattern: jwt.NewWithClaims($METHOD, $CLAIMS).SignedString([]byte("..."))
      - pattern: $TOKEN.SignedString([]byte("..."))
