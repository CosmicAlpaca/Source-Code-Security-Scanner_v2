rules:
  - id: java-weak-hash-algorithm
    languages: [java]
    severity: WARNING
    message: >-
      MD5 and SHA-1 are cryptographically broken. Do not use them for passwords or
      data integrity. Use SHA-256 or stronger; for passwords use BCrypt or Argon2.
    metadata:
      category: security
      cwe: "CWE-327: Weak Cryptographic Algorithm"
      owasp: "A02:2021 - Cryptographic Failures"
      confidence: HIGH
    pattern-either:
      - pattern: MessageDigest.getInstance("MD5")
      - pattern: MessageDigest.getInstance("SHA-1")
      - pattern: MessageDigest.getInstance("SHA1")
