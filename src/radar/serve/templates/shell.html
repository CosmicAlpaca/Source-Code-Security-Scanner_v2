<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>security-radar — live</title>
<style>/*__SHARED_CSS__*/</style>
<link rel="stylesheet" href="/static/app.css">
<script src="/static/chart.umd.min.js"></script>
<script src="/static/d3.v7.min.js"></script>
</head>
<body>
<div class="header">
  <h1>⚡ security-radar <span style="font-size:.8rem;opacity:.7">· live</span></h1>
  <div class="meta">
    <span id="repo-path">scanning…</span>
    <span class="badge-mode">live dashboard</span>
  </div>
</div>

<div id="status-banner" class="status-banner" data-level="ok">
  <span id="status-dot" class="status-dot"></span>
  <span id="status-text">connecting…</span>
  <button id="triage-btn" class="triage-btn" onclick="runTriage()">✦ Run AI triage</button>
</div>

<div class="tabs">
  <button class="tab-btn" data-tab="overview" onclick="showTab('overview')">📊 Overview</button>
  <button class="tab-btn" data-tab="findings" onclick="showTab('findings')">🛡 Findings <span class="cnt" id="cnt-findings">0</span></button>
  <button class="tab-btn active" data-tab="blast" onclick="showTab('blast')">🔗 Blast Radius</button>
  <button class="tab-btn" data-tab="history" onclick="showTab('history')">📈 History</button>
  <button class="tab-btn" data-tab="graph" onclick="showTab('graph')">🕸 Graph</button>
</div>

<div id="tab-overview" class="tab-content"><div id="panel-overview"></div></div>
<div id="tab-findings" class="tab-content"><div id="panel-findings"></div></div>
<div id="tab-blast" class="tab-content active">
  <div class="impact-toolbar">
    <span class="impact-label">Trace impact of:</span>
    <button class="imp-btn active" data-mode="changes" onclick="setImpact('changes')">Changes (vs HEAD)</button>
    <button class="imp-btn" data-mode="file" onclick="setImpact('file')">This file</button>
    <button class="imp-btn" data-mode="findings" onclick="setImpact('findings')">Findings</button>
    <input id="impact-fn" class="search-box" placeholder="🔍 trace a function…"
           onkeydown="if(event.key==='Enter'){setImpactFn(this.value);}">
  </div>
  <div id="panel-blast"></div>
</div>
<div id="tab-history" class="tab-content"><div id="panel-history"></div></div>
<div id="tab-graph" class="tab-content">
  <div id="panel-graph">
    <div class="graph-toolbar">
      <input id="graph-search" class="search-box" placeholder="🔍 Search node / file…">
      <span id="graph-stats" class="graph-stats"></span>
    </div>
    <svg id="graph-canvas"></svg>
    <div id="graph-tip" class="graph-tip"></div>
  </div>
</div>

<footer>Generated by <b>security-radar</b> · live SSE dashboard · auto-updates on save</footer>

<script>/*__SHARED_JS__*/</script>
<script src="/static/app.js"></script>
</body>
</html>
